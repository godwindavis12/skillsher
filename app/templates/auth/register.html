{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper card">
    <h2 class="text-center mb-4">Make the most of your professional life</h2>
    
    <form method="POST" action="">
        <div class="form-group">
            <label class="form-label" for="username">First name / Identifier</label>
            <input class="form-control" type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password (6 or more characters)</label>
            <input class="form-control" type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="role">I am a...</label>
            <select class="form-control" id="role" name="role" required>
                <option value="fresher" {% if request.args.get('role') == 'fresher' %}selected{% endif %}>Fresher (Looking for Job)</option>
                <option value="employer" {% if request.args.get('role') == 'employer' %}selected{% endif %}>Employer (Looking to Hire)</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 16px; text-align: center;">By clicking Agree & Join, you agree to the Skill Sher User Agreement, Privacy Policy, and Cookie Policy.</p>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 28px; padding: 14px;">Agree & Join</button>
    </form>
    
    <div class="text-center mt-4" style="font-size: 14px;">
        Already on Skill Sher? <a href="{{ url_for('auth.login') }}" style="color: var(--linkedin-blue); font-weight: 600; text-decoration: none;">Sign in</a>
    </div>
</div>
{% endblock %}
